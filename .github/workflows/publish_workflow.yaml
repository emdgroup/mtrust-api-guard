name: M-Trust API Guard PR
on:
  workflow_call:
    inputs:
      pre_release:
        type: boolean
        description: "Whether to run the version command with the pre-release flag"
        default: false
      use_local_version:
        type: boolean
        description: "Whether to use the local version of mtrust_api_guard. (dont use this if you are not developing api guard)"
        default: false

      commit_name:
        type: string
        description: "Name to use for the commit"
        default: "GitHub Actions"

      commit_email:
        type: string
        description: "Email to use for the commit"
        default: "gh-actions@emdgroup.com"

      git_push:
        type: boolean
        description: "Whether to push the changes to the remote repository"
        default: true

      git_push_branch:
        type: string
        description: "The branch to push the changes to"
        default: "main"

    secrets:
      # GitHub App credentials (app_id + app_private_key) take precedence over token.
      # Setting up a GitHub App is generally preferred: the identity is org-owned,
      # credentials don't expire, and bypass permissions can be scoped precisely per
      # ruleset — unlike a PAT which is tied to an individual user.
      app_id:
        description: "The app id to use for cloning and pushing (takes precedence over token)"
        required: false
      app_private_key:
        description: "The private key to use for cloning and pushing (takes precedence over token)"
        required: false
      token:
        description: "A PAT or elevated token to use for cloning and pushing (used when app_id/app_private_key are not provided)"
        required: false

jobs:
  compare_api_changes:
    runs-on: ubuntu-latest
    steps:
      # Determine which auth method to use (app > token > github default)
      - name: Check which auth method to use
        id: check-secrets
        run: |
          if [ -n "${{ secrets.app_id }}" ] && [ -n "${{ secrets.app_private_key }}" ]; then
            echo "auth_method=app" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.token }}" ]; then
            echo "auth_method=token" >> $GITHUB_OUTPUT
          else
            echo "auth_method=github" >> $GITHUB_OUTPUT
          fi
      # Authenticate and clone as github app
      - name: 🔑 Get token for bumper app
        if: steps.check-secrets.outputs.auth_method == 'app'
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
      - name: Checkout code using app token
        if: steps.check-secrets.outputs.auth_method == 'app'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      # Authenticate and clone using provided token
      - name: Checkout code using provided token
        if: steps.check-secrets.outputs.auth_method == 'token'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.token }}
      # Authenticate and clone as github user
      - name: Checkout code using github token
        if: steps.check-secrets.outputs.auth_method == 'github'
        uses: actions/checkout@v4
      # Fetch tags and configure git
      - name: Fetch all tags
        run: git fetch --tags
      - name: Configure git
        run: |
          git fetch --prune --unshallow || true
          git config --global user.name "${{ inputs.commit_name }}"
          git config --global user.email "${{ inputs.commit_email }}"
      # Install Flutter and dependencies
      - name: Install Flutter
        uses: subosito/flutter-action@v2
      - name: Install dependencies
        run: flutter pub get
      - name: Install mtrust_api_guard from pub.dev
        if: inputs.use_local_version == false
        run: dart pub global activate mtrust_api_guard
      # Install mtrust_api_guard from local path
      - name: Install mtrust_api_guard from local path
        if: inputs.use_local_version
        run: dart pub global activate --source path .
      # Compare API changes
      - name: Compare API changes
        id: version
        run: mtrust_api_guard version --badge --commit --tag --generate-changelog --json version_output.json  ${{ inputs.pre_release && '--pre-release' || '' }}
      # Push branch and tags separately so that the tag push is a pure ref update
      # with no commit messages. This ensures [skip ci] in the version bump commit
      # does not suppress workflows triggered by the tag (e.g. pub.dev publish).
      - name: Push branch to remote repository
        if: inputs.git_push
        run: git push origin ${{ inputs.git_push_branch }}
      - name: Push tags to remote repository
        if: inputs.git_push
        run: git push origin --tags
